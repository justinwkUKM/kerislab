services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      KERISLAB_AUTH_MODE: development
      KERISLAB_LITELLM_BASE_URL: http://litellm:4000
    ports:
      - "8000:8000"
    depends_on:
      - litellm

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--host", "0.0.0.0", "--port", "4000"]
    ports:
      - "4000:4000"
