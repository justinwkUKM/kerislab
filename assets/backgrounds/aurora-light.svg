<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title desc">
  <title id="title">KerisLab aurora light background</title>
  <desc id="desc">Soft light background for dashboards and settings with controlled aurora gradients.</desc>
  <defs>
    <linearGradient id="al-base" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5F5F7"/>
