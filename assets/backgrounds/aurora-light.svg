    <radialGradient id="al-cyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1240 110) rotate(130) scale(680 420)">
      <stop offset="0" stop-color="#00A7D1" stop-opacity="0.2"/>
